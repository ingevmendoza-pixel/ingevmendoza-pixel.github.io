<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diferencia de Potencial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    background: #0d1117;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    color: #dde6f0;
    padding: 16px 24px;
    gap: 10px;
  }
  header { text-align:center; }
  header h1 {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #e8f0ff;
  }
  header p {
    font-size: 0.75rem;
    color: #445566;
    letter-spacing: 0.12em;
    margin-top: 2px;
  }
  canvas { display:block; border-radius: 12px; }

  .info-row {
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  .info-box {
    padding: 7px 20px;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
  }
  .box-a  { background: rgba(255,80,30,0.12); color:#ff7040; border:1px solid #a03010; }
  .box-b  { background: rgba(30,120,255,0.12); color:#60a8ff; border:1px solid #1050a0; }
  .box-dp { background: rgba(180,80,255,0.12); color:#c070ff; border:1px solid #6020a0; }
</style>
</head>
<body>

<header>
  <h1>Diferencia de Potencial</h1>
  <p>Los electrones fluyen del cuerpo con mayor carga al de menor carga</p>
</header>

<canvas id="cv"></canvas>

<div class="info-row">
  <div class="info-box box-a">Cuerpo A · 12 V</div>
  <div class="info-box box-dp">Diferencia · 12V − 5V = 7V</div>
  <div class="info-box box-b">Cuerpo B · 5 V</div>
</div>

<script>
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');

// Size canvas to available space
function resize() {
  const maxW = Math.min(window.innerWidth - 48, 860);
  const maxH = Math.min(window.innerHeight - 160, 440);
  canvas.width  = maxW;
  canvas.height = maxH;
}
resize();
window.addEventListener('resize', resize);

// ── Layout constants (relative) ──────────────────────────────────────────
function layout() {
  const W = canvas.width, H = canvas.height;
  const pad  = W * 0.04;
  const tankW = W * 0.22;
  const tankH = H * 0.80;
  const tankY = H * 0.08;

  const aX = pad;
  const bX = W - pad - tankW;
  const floorY = tankY + tankH;
  const pipeY  = floorY - H * 0.08;
  const bulbX  = W / 2;
  const bulbY  = pipeY;

  return { W, H, pad, tankW, tankH, tankY, aX, bX, floorY, pipeY, bulbX, bulbY };
}

// ── Electrons inside tanks ────────────────────────────────────────────────
function makeElectrons(n, x, y, w, h) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    arr.push({
      x: x + 14 + Math.random() * (w - 28),
      y: y + 14 + Math.random() * (h - 28),
      vx: (Math.random()-0.5)*18,
      vy: (Math.random()-0.5)*18,
      r: 9 + Math.random()*4,
      phase: Math.random()*Math.PI*2,
    });
  }
  return arr;
}

let eA = [], eB = [];

// ── Pipe electrons (flowing A→B) ──────────────────────────────────────────
const pipeElectrons = [];
for (let i = 0; i < 10; i++) {
  pipeElectrons.push({ t: i / 10 }); // t in [0,1] along pipe
}

// ── Bulb glow ─────────────────────────────────────────────────────────────
let bulbPulse = 0;

// ── Draw helpers ──────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x, y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawTank(x, y, w, h, label, voltLabel, voltColor, fillFrac, fillColor) {
  const l = layout();
  // outer border
  ctx.save();
  ctx.strokeStyle = voltColor;
  ctx.lineWidth = 2.5;
  roundRect(ctx, x, y, w, h, 8);
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  // fill level
  const fillH = (h - 4) * fillFrac;
  ctx.save();
  roundRect(ctx, x+2, y + h - 2 - fillH, w-4, fillH, 6);
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.restore();

  // big letter
  ctx.save();
  ctx.font = `bold ${w*0.38}px "Rajdhani",sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w/2, y + h*0.38);
  ctx.restore();

  // volt label top-left
  ctx.save();
  ctx.font = `bold ${l.H*0.038}px "Rajdhani",sans-serif`;
  ctx.fillStyle = voltColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(voltLabel, x - l.W*0.065, y + 2);
  ctx.restore();
}

function drawElectronBall(ex, ey, er, col1, col2, glow) {
  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = 10;
  const g = ctx.createRadialGradient(ex-er*.3, ey-er*.3, 1, ex, ey, er);
  g.addColorStop(0, col1); g.addColorStop(1, col2);
  ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = col2; ctx.lineWidth = 1.2; ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${er*0.85}px "Rajdhani",sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('−', ex, ey+1);
  ctx.restore();
}

function drawBulb(bx, by, pulse) {
  const r = 18;
  // glow
  ctx.save();
  ctx.shadowColor = `rgba(255,220,80,${0.3 + pulse*0.6})`;
  ctx.shadowBlur = 20 + pulse*30;
  const g = ctx.createRadialGradient(bx, by, 1, bx, by, r);
  g.addColorStop(0, `rgba(255,240,120,${0.5+pulse*0.5})`);
  g.addColorStop(1, `rgba(200,120,0,${0.2+pulse*0.4})`);
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2);
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = `rgba(255,180,40,${0.5+pulse*0.4})`;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // X symbol inside bulb
  ctx.save();
  ctx.strokeStyle = `rgba(255,200,60,${0.6+pulse*0.4})`;
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(bx-9, by-9); ctx.lineTo(bx+9, by+9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+9, by-9); ctx.lineTo(bx-9, by+9); ctx.stroke();
  ctx.restore();
}

function drawArrow(x1, y1, x2, y2, color, label) {
  ctx.save();
  ctx.strokeStyle = color; ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const ang = Math.atan2(y2-y1, x2-x1);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-11*Math.cos(ang-0.4), y2-11*Math.sin(ang-0.4));
  ctx.lineTo(x2-11*Math.cos(ang+0.4), y2-11*Math.sin(ang+0.4));
  ctx.closePath(); ctx.fill();
  if (label) {
    ctx.font = `bold 11px "Rajdhani",sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(label, (x1+x2)/2, y1 - 4);
  }
  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────────────────
let last = null;

function loop(ts) {
  if (!last) last = ts;
  const dt = Math.min((ts-last)/1000, 0.05); last = ts;
  const l = layout();
  const { W, H, tankW, tankH, tankY, aX, bX, floorY, pipeY, bulbX, bulbY } = l;

  // Init electrons if needed
  if (eA.length === 0) {
    eA = makeElectrons(14, aX, tankY, tankW, tankH * 0.85);
    eB = makeElectrons(5,  bX, tankY + tankH*0.5, tankW, tankH * 0.45);
  }

  ctx.clearRect(0, 0, W, H);

  // ── 0V ground line ──
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([6,6]);
  ctx.beginPath();
  ctx.moveTo(aX - 30, floorY);
  ctx.lineTo(bX + tankW + 30, floorY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#3a4a5a';
  ctx.font = `bold ${H*0.032}px "Rajdhani",sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText('Nivel 0V (Masa)', aX, floorY + H*0.022);
  // ground symbol
  ctx.strokeStyle = '#3a4a5a';
  ctx.lineWidth = 1.5;
  for (let g = 0; g < 3; g++) {
    const gw = (14 - g*4);
    ctx.beginPath();
    ctx.moveTo(aX + tankW/2 - gw, floorY + g*5 + 4);
    ctx.lineTo(aX + tankW/2 + gw, floorY + g*5 + 4);
    ctx.stroke();
  }
  ctx.restore();

  // ── Pipe (channel between tanks) ──
  const pipeL = aX + tankW;
  const pipeR = bX;
  ctx.save();
  ctx.fillStyle = 'rgba(40,60,80,0.6)';
  ctx.strokeStyle = 'rgba(80,120,160,0.3)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.rect(pipeL, pipeY - 14, pipeR - pipeL, 28);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // ── Pipe electrons moving A→B ──
  pipeElectrons.forEach(pe => {
    pe.t += dt * 0.18;
    if (pe.t > 1) pe.t -= 1;
    const ex = pipeL + pe.t * (pipeR - pipeL);
    const ey = pipeY;
    drawElectronBall(ex, ey, 8, '#a0d0ff', '#1060d0', 'rgba(40,140,255,0.8)');
  });

  // ── Bulb pulse ──
  bulbPulse = 0.5 + 0.5*Math.sin(ts/300);
  drawBulb(bulbX, bulbY, bulbPulse);

  // ── Electrons in A (bounce) ──
  eA.forEach(e => {
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    if (e.x < aX + e.r) { e.x = aX + e.r; e.vx *= -1; }
    if (e.x > aX + tankW - e.r) { e.x = aX + tankW - e.r; e.vx *= -1; }
    if (e.y < tankY + e.r) { e.y = tankY + e.r; e.vy *= -1; }
    if (e.y > floorY - e.r) { e.y = floorY - e.r; e.vy *= -1; }
    drawElectronBall(e.x, e.y, e.r, '#ffccaa', '#e05020', 'rgba(220,80,30,0.7)');
  });

  // ── Tanks ──
  drawTank(aX, tankY, tankW, tankH, 'A', 'Nivel 12V', '#ff6030',
           0.82, 'rgba(220,70,20,0.12)');
  drawTank(bX, tankY + tankH*0.45, tankW, tankH*0.55, 'B', 'Nivel 5V', '#4090ff',
           0.55, 'rgba(30,90,220,0.12)');

  // ── Electrons in B (fewer, calmer) ──
  eB.forEach(e => {
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    const bTop = tankY + tankH*0.45;
    if (e.x < bX + e.r) { e.x = bX + e.r; e.vx *= -1; }
    if (e.x > bX + tankW - e.r) { e.x = bX + tankW - e.r; e.vx *= -1; }
    if (e.y < bTop + e.r) { e.y = bTop + e.r; e.vy *= -1; }
    if (e.y > floorY - e.r) { e.y = floorY - e.r; e.vy *= -1; }
    drawElectronBall(e.x, e.y, e.r, '#b0d8ff', '#1060c0', 'rgba(30,100,220,0.7)');
  });

  // ── Difference of potential arrow (vertical) ──
  const dpX = W * 0.5;
  ctx.save();
  // vertical double arrow
  ctx.strokeStyle = 'rgba(180,80,255,0.5)';
  ctx.fillStyle = 'rgba(180,80,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4,3]);
  ctx.beginPath();
  ctx.moveTo(dpX, tankY + tankH*0.05);
  ctx.lineTo(dpX, tankY + tankH*0.45);
  ctx.stroke();
  ctx.setLineDash([]);
  // label
  ctx.fillStyle = '#c070ff';
  ctx.font = `bold ${H*0.038}px "Rajdhani",sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('ΔV = 7V', dpX, tankY + tankH*0.22);
  ctx.font = `${H*0.026}px "Rajdhani",sans-serif`;
  ctx.fillStyle = '#7050a0';
  ctx.fillText('12V − 5V', dpX, tankY + tankH*0.30);
  ctx.restore();

  // ── Labels ──
  ctx.save();
  ctx.font = `bold ${H*0.034}px "Rajdhani",sans-serif`;
  ctx.textAlign = 'center';

  // "Corriente eléctrica"
  ctx.fillStyle = 'rgba(255,180,40,0.7)';
  ctx.fillText('Corriente eléctrica', bulbX, pipeY - 22);

  // bottom label
  ctx.fillStyle = '#3a5a7a';
  ctx.font = `bold ${H*0.030}px "Rajdhani",sans-serif`;
  ctx.fillText('Circulación de electrones: Cuerpo A → Cuerpo B', W/2, floorY + H*0.07);
  ctx.restore();

  // bottom arrow A→B
  drawArrow(aX + tankW*0.3, floorY + H*0.05,
            bX + tankW*0.7, floorY + H*0.05,
            'rgba(60,140,255,0.35)', '');

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
