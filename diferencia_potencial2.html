
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Diferencia de Potencial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; }

  body {
    background: #eef2f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    padding: 14px 20px 12px;
    gap: 10px;
  }

  header { text-align: center; }
  header h1 {
    font-size: clamp(0.85rem, 3vw, 1.15rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #1a2a3a;
  }
  header p {
    font-size: clamp(0.65rem, 2vw, 0.76rem);
    color: #7a8898;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  canvas {
    display: block;
    border-radius: 14px;
    box-shadow: 0 4px 28px rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.06);
    max-width: 100%;
  }

  .info-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .info-box {
    padding: 5px 14px;
    border-radius: 8px;
    font-size: clamp(0.62rem, 2.2vw, 0.8rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
  }
  .box-a  { background:#fde8e0; color:#c03010; border:1.5px solid #e07050; }
  .box-dp { background:#ede0ff; color:#6020a0; border:1.5px solid #a060e0; }
  .box-b  { background:#ddeeff; color:#0040a0; border:1.5px solid #5090d0; }
</style>
</head>
<body>

<header>
  <h1>Diferencia de Potencial</h1>
  <p>Los electrones fluyen del cuerpo con mayor carga al de menor carga</p>
</header>

<canvas id="cv"></canvas>

<div class="info-row">
  <div class="info-box box-a">Cuerpo A · 12 V</div>
  <div class="info-box box-dp">ΔV = 12V − 5V = 7V</div>
  <div class="info-box box-b">Cuerpo B · 5 V</div>
</div>

<script>
const canvas = document.getElementById('cv');
const ctx    = canvas.getContext('2d');

// Detect mobile
const isMobile = () => window.innerWidth < 600;

function resize() {
  if (isMobile()) {
    // Portrait mobile: nearly full width, taller than wide
    canvas.width  = Math.min(window.innerWidth - 24, 420);
    canvas.height = Math.min(window.innerHeight - 140, 620);
  } else {
    // Desktop: wide landscape
    canvas.width  = Math.min(window.innerWidth - 48, 880);
    canvas.height = Math.min(window.innerHeight - 160, 460);
  }
}
resize();

let eA=[], eB=[];
window.addEventListener('resize', () => { resize(); eA=[]; eB=[]; });

// ── Layout — returns different values for mobile vs desktop ──────────────
function L() {
  const W = canvas.width, H = canvas.height;
  const mobile = isMobile();

  if (mobile) {
    // VERTICAL layout: A on top, pipe horizontal in middle, B on bottom
    const tankW  = W * 0.52;
    const tankH  = H * 0.26;
    const padX   = (W - tankW) / 2;
    const aX     = padX;
    const bX     = padX;
    const aY     = H * 0.04;
    const bY     = H * 0.62;
    const pipeX  = W / 2;
    const pipeTopY = aY + tankH;
    const pipeBotY = bY;
    const bulbY  = (pipeTopY + pipeBotY) / 2;
    const bulbX  = W / 2;
    return { W, H, mobile, tankW, tankH, padX,
             aX, aY, bX, bY,
             pipeX, pipeTopY, pipeBotY, bulbX, bulbY };
  } else {
    // HORIZONTAL layout: original desktop
    const tankW  = W * 0.21;
    const tankH  = H * 0.78;
    const tankY  = H * 0.09;
    const padX   = W * 0.04;
    const aX     = padX;
    const bX     = W - padX - tankW;
    const floorY = tankY + tankH;
    const pipeY  = floorY - H * 0.09;
    const bulbX  = W / 2;
    return { W, H, mobile, tankW, tankH, tankY, padX,
             aX, bX, floorY, pipeY, bulbX };
  }
}

// ── Electrons ─────────────────────────────────────────────────────────────
function makeE(n, x, y, w, h) {
  return Array.from({length:n}, () => ({
    x:  x + 12 + Math.random()*(w-24),
    y:  y + 12 + Math.random()*(h-24),
    vx: (Math.random()-.5)*20,
    vy: (Math.random()-.5)*20,
    r:  7 + Math.random()*3,
  }));
}

const PIPE_N = 10;
const pipeP  = Array.from({length:PIPE_N}, (_,i) => ({ t: i/PIPE_N }));

// ── Draw helpers ──────────────────────────────────────────────────────────
function rr(x,y,w,h,r=8) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function eBall(x,y,r,c1,c2,sc) {
  ctx.save();
  const g = ctx.createRadialGradient(x-r*.35,y-r*.35,1,x,y,r);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle=sc; ctx.lineWidth=1.3; ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.font=`bold ${r*.88}px "Rajdhani",sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.25)'; ctx.shadowBlur=3;
  ctx.fillText('−',x,y+1);
  ctx.restore();
}

function arrow(x1,y1,x2,y2,col,lw=2) {
  ctx.save();
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=lw;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-10*Math.cos(a-.42),y2-10*Math.sin(a-.42));
  ctx.lineTo(x2-10*Math.cos(a+.42),y2-10*Math.sin(a+.42));
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function lbl(text,x,y,col,size,align='center',bold=true) {
  ctx.save();
  ctx.font=`${bold?'bold ':''} ${size}px "Rajdhani",sans-serif`;
  ctx.fillStyle=col; ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,0.95)'; ctx.shadowBlur=5;
  ctx.fillText(text,x,y);
  ctx.restore();
}

function drawTank(x, y, w, h, letter, fillFrac, strokeCol, fillCol, eArr,
                  clampX1, clampX2, clampY1, clampY2) {
  // fill
  const fh = (h-4)*fillFrac;
  ctx.save();
  rr(x+2, y+h-2-fh, w-4, fh, 6);
  ctx.fillStyle=fillCol; ctx.fill();
  ctx.restore();
  // border
  ctx.save();
  rr(x, y, w, h, 10);
  ctx.strokeStyle=strokeCol; ctx.lineWidth=2.5; ctx.stroke();
  ctx.restore();
  // big letter
  ctx.save();
  ctx.font=`bold ${w*.44}px "Rajdhani",sans-serif`;
  ctx.fillStyle='rgba(0,0,0,0.07)';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(letter, x+w/2, y+h*.38);
  ctx.restore();
  // electrons
  eArr.forEach(e => {
    e.x+=e.vx*_dt; e.y+=e.vy*_dt;
    if(e.x<clampX1+e.r){e.x=clampX1+e.r;e.vx*=-1;}
    if(e.x>clampX2-e.r){e.x=clampX2-e.r;e.vx*=-1;}
    if(e.y<clampY1+e.r){e.y=clampY1+e.r;e.vy*=-1;}
    if(e.y>clampY2-e.r){e.y=clampY2-e.r;e.vy*=-1;}
    eBall(e.x,e.y,e.r,
      letter==='A'?'#ffccaa':'#b8d8ff',
      letter==='A'?'#d05020':'#1060c0',
      letter==='A'?'#a03000':'#0040a0');
  });
}

function drawBulb(bx, by, pulse, size) {
  const bR = size;
  ctx.save();
  const glowR=ctx.createRadialGradient(bx,by,2,bx,by,bR+16);
  glowR.addColorStop(0,`rgba(255,210,60,${.3+pulse*.4})`);
  glowR.addColorStop(1,'rgba(255,200,40,0)');
  ctx.beginPath(); ctx.arc(bx,by,bR+16,0,Math.PI*2);
  ctx.fillStyle=glowR; ctx.fill();
  const bg=ctx.createRadialGradient(bx-6,by-6,1,bx,by,bR);
  bg.addColorStop(0,`rgba(255,255,200,${.8+pulse*.2})`);
  bg.addColorStop(1,`rgba(220,160,20,${.6+pulse*.3})`);
  ctx.beginPath(); ctx.arc(bx,by,bR,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle=`rgba(180,120,10,${.6+pulse*.3})`; ctx.lineWidth=2; ctx.stroke();
  const cx2=bR*.55;
  ctx.strokeStyle=`rgba(120,60,0,${.5+pulse*.4})`; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.moveTo(bx-cx2,by-cx2); ctx.lineTo(bx+cx2,by+cx2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx+cx2,by-cx2); ctx.lineTo(bx-cx2,by+cx2); ctx.stroke();
  ctx.restore();
}

let last=null, _dt=0, _t=0;

function draw(ts) {
  if(!last) last=ts;
  _dt=Math.min((ts-last)/1000,.05); last=ts; _t=ts/1000;

  const l=L();
  const {W,H,mobile}=l;

  if(!eA.length) {
    if(mobile) {
      const {tankW,tankH,aX,aY,bX,bY}=l;
      eA=makeE(10,aX+3,aY+3,tankW-6,tankH-6);
      eB=makeE(4, bX+3,bY+3,tankW-6,tankH-6);
    } else {
      const {tankW,tankH,tankY,aX,bX,floorY}=l;
      eA=makeE(15,aX+3,tankY+4,tankW-6,tankH*0.78);
      eB=makeE(5, bX+3,tankY+tankH*.48,tankW-6,tankH*.48);
    }
  }

  ctx.clearRect(0,0,W,H);

  // background
  ctx.save();
  rr(0,0,W,H,14);
  ctx.fillStyle='#f4f7fb'; ctx.fill();
  ctx.restore();

  const pulse=.5+.5*Math.sin(_t*3.5);

  // ════════════════════════════════════════════════════
  if (mobile) {
    const {tankW,tankH,padX,aX,aY,bX,bY,pipeX,pipeTopY,pipeBotY,bulbX,bulbY}=l;
    const fs = W*0.034; // base font size

    // ── Tank A (top) ──
    drawTank(aX, aY, tankW, tankH, 'A', 0.82,
             '#d05020','rgba(220,80,30,0.09)',eA,
             aX,aX+tankW, aY,aY+tankH);
    lbl('Nivel 12V', aX, aY-fs*.8, '#c03010', fs, 'left');

    // ── Tank B (bottom) ──
    drawTank(bX, bY, tankW, tankH, 'B', 0.48,
             '#1060c0','rgba(20,80,200,0.09)',eB,
             bX,bX+tankW, bY,bY+tankH);
    lbl('Nivel 5V', bX, bY-fs*.8, '#0050a0', fs, 'left');

    // ── Vertical pipe ──
    const pipeW = 28;
    const pX = pipeX - pipeW/2;
    ctx.save();
    rr(pX, pipeTopY, pipeW, pipeBotY-pipeTopY, 6);
    ctx.fillStyle='#dde8f4'; ctx.fill();
    ctx.strokeStyle='#a0b8cc'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.restore();

    // pipe electrons flow downward
    pipeP.forEach(pe => {
      pe.t+=_dt*0.22; if(pe.t>1) pe.t-=1;
      const ey=pipeTopY+pe.t*(pipeBotY-pipeTopY);
      eBall(pipeX, ey, 7, '#c0e0ff','#1868d0','#0048b0');
    });

    // ── Bulb ──
    drawBulb(bulbX+tankW*.52, bulbY, pulse, 17);
    lbl('Carga\neléctrica', bulbX+tankW*.52+22, bulbY, '#8a6000', fs*0.85, 'left');

    // current arrows
    arrow(pipeX, pipeTopY+20, pipeX, pipeTopY+8, 'rgba(26,74,122,0.5)', 1.5);
    lbl('← Corriente', W*.5-tankW*.22, (pipeTopY+pipeBotY)/2, '#1a4a7a', fs*0.88, 'right');

    // ΔV box center
    const dvX=W*.5-tankW*.22, dvY=(pipeTopY+pipeBotY)/2-fs*3;
    ctx.save();
    rr(dvX-48, dvY-fs*1.1, 96, fs*2.3, 6);
    ctx.fillStyle='rgba(240,230,255,0.95)';
    ctx.strokeStyle='#a060e0'; ctx.lineWidth=1.2;
    ctx.fill(); ctx.stroke();
    ctx.restore();
    lbl('ΔV = 7V',   dvX, dvY,      '#6020a0', fs*1.1);
    lbl('12V − 5V', dvX, dvY+fs*1.1,'#9060c0', fs*0.82, 'center', false);

    // 0V floor line
    const floor0 = bY+tankH+H*.028;
    ctx.save();
    ctx.strokeStyle='#b0bcc8'; ctx.lineWidth=1.2;
    ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(aX-8,floor0); ctx.lineTo(aX+tankW+8,floor0); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    lbl('Nivel 0V — Masa', aX+tankW/2, floor0+fs*.9, '#8899aa', fs*.82);

    // bottom arrow
    arrow(aX+tankW*.15, floor0+fs*1.9, aX+tankW*.85, floor0+fs*1.9, 'rgba(30,100,200,0.35)', 1.8);
    lbl('A → B', aX+tankW/2, floor0+fs*2.0, '#3a6a9a', fs*.82);

  // ════════════════════════════════════════════════════
  } else {
    const {tankW,tankH,tankY,aX,bX,floorY,pipeY,bulbX}=l;
    const fs=H*.032;

    // floor line
    ctx.save();
    ctx.strokeStyle='#b0bcc8'; ctx.lineWidth=1.5;
    ctx.setLineDash([6,5]);
    ctx.beginPath(); ctx.moveTo(aX-10,floorY); ctx.lineTo(bX+tankW+10,floorY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    lbl('Nivel 0V — Masa (referencia)', W/2, floorY+H*.028, '#8899aa', H*.03);

    // ground symbol
    ctx.save(); ctx.strokeStyle='#8899aa'; ctx.lineWidth=1.5;
    [12,8,4].forEach((gw,i)=>{
      ctx.beginPath();
      ctx.moveTo(aX+tankW/2-gw,floorY+i*5+4);
      ctx.lineTo(aX+tankW/2+gw,floorY+i*5+4);
      ctx.stroke();
    });
    ctx.restore();

    // pipe
    const pL=aX+tankW, pR=bX;
    ctx.save();
    rr(pL, pipeY-16, pR-pL, 32, 6);
    ctx.fillStyle='#dde8f4'; ctx.fill();
    ctx.strokeStyle='#a0b8cc'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.restore();

    pipeP.forEach(pe=>{
      pe.t+=_dt*.20; if(pe.t>1) pe.t-=1;
      const ex=pL+pe.t*(pR-pL);
      eBall(ex,pipeY,8,'#c0e0ff','#1868d0','#0048b0');
    });

    // bulb
    drawBulb(bulbX, pipeY, pulse, 20);
    lbl('Carga eléctrica', bulbX, pipeY+34, '#8a6000', H*.028);
    lbl('← Corriente eléctrica →', bulbX, pipeY-30, '#1a4a7a', H*.031);

    // Tank A
    const aFillH=tankH*.80;
    ctx.save(); rr(aX+2,tankY+tankH-aFillH,tankW-4,aFillH,6);
    ctx.fillStyle='rgba(220,80,30,0.08)'; ctx.fill(); ctx.restore();
    ctx.save(); rr(aX,tankY,tankW,tankH,10);
    ctx.strokeStyle='#d05020'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
    ctx.save();
    ctx.font=`bold ${tankW*.45}px "Rajdhani",sans-serif`;
    ctx.fillStyle='rgba(200,60,10,0.10)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('A',aX+tankW/2,tankY+tankH*.38);
    ctx.restore();

    eA.forEach(e=>{
      e.x+=e.vx*_dt; e.y+=e.vy*_dt;
      if(e.x<aX+e.r){e.x=aX+e.r;e.vx*=-1;}
      if(e.x>aX+tankW-e.r){e.x=aX+tankW-e.r;e.vx*=-1;}
      if(e.y<tankY+e.r){e.y=tankY+e.r;e.vy*=-1;}
      if(e.y>floorY-e.r){e.y=floorY-e.r;e.vy*=-1;}
      eBall(e.x,e.y,e.r,'#ffccaa','#d05020','#a03000');
    });

    lbl('Nivel 12V',aX-4,tankY-H*.026,'#c03010',H*.033,'left');
    lbl('29 protones',aX+tankW/2,tankY+tankH*.92,'#aa4010',H*.026);

    // Tank B
    const bTop=tankY+tankH*.46, bH=tankH*.54, bFillH=bH*.52;
    ctx.save(); rr(bX+2,bTop+bH-bFillH,tankW-4,bFillH,6);
    ctx.fillStyle='rgba(20,80,200,0.08)'; ctx.fill(); ctx.restore();
    ctx.save(); rr(bX,bTop,tankW,bH,10);
    ctx.strokeStyle='#1060c0'; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
    ctx.save();
    ctx.font=`bold ${tankW*.45}px "Rajdhani",sans-serif`;
    ctx.fillStyle='rgba(10,60,200,0.10)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('B',bX+tankW/2,bTop+bH*.38);
    ctx.restore();

    eB.forEach(e=>{
      e.x+=e.vx*_dt; e.y+=e.vy*_dt;
      if(e.x<bX+e.r){e.x=bX+e.r;e.vx*=-1;}
      if(e.x>bX+tankW-e.r){e.x=bX+tankW-e.r;e.vx*=-1;}
      if(e.y<bTop+e.r){e.y=bTop+e.r;e.vy*=-1;}
      if(e.y>floorY-e.r){e.y=floorY-e.r;e.vy*=-1;}
      eBall(e.x,e.y,e.r,'#b8d8ff','#1060c0','#0040a0');
    });

    lbl('Nivel 5V',bX+tankW+4,bTop-H*.026,'#0050a0',H*.033,'right');

    // ΔV indicator
    const dvX=W*.5-W*.07, dvY1=tankY+H*.02, dvY2=bTop-H*.02;
    ctx.save();
    ctx.strokeStyle='rgba(140,60,200,0.5)'; ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(dvX,dvY1); ctx.lineTo(dvX,dvY2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    arrow(dvX,dvY1+12,dvX,dvY1+2,'rgba(140,60,200,0.6)',1.5);
    arrow(dvX,dvY2-12,dvX,dvY2-2,'rgba(140,60,200,0.6)',1.5);

    const lvX=dvX+8, lvY=(dvY1+dvY2)/2;
    ctx.save();
    rr(lvX-4,lvY-H*.045,W*.1,H*.09,6);
    ctx.fillStyle='rgba(240,230,255,0.92)';
    ctx.strokeStyle='#a060e0'; ctx.lineWidth=1.2;
    ctx.fill(); ctx.stroke();
    ctx.restore();
    lbl('ΔV = 7V',  lvX+W*.046,lvY-H*.015,'#6020a0',H*.036);
    lbl('12V − 5V', lvX+W*.046,lvY+H*.022,'#9060c0',H*.026,'center',false);

    // bottom arrow
    arrow(aX+tankW*.2,floorY+H*.055,bX+tankW*.8,floorY+H*.055,'rgba(30,100,200,0.4)',2);
    lbl('Circulación de electrones: Cuerpo A → Cuerpo B',W/2,floorY+H*.065,'#3a6a9a',H*.029);
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
