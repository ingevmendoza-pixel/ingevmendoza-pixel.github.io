<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Animaciones de Química</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f4ee;
            text-align: center;
            padding: 40px;
        }
        h1 {
            color: #334;
            font-size: 32px;
        }
        .sub {
            color: #666;
            margin-bottom: 40px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 280px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        a {
            text-decoration: none;
            color: #0066cc;
        }
        p {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        footer {
            margin-top: 50px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🧪 Animaciones de Química</h1>
    <p class="sub">Selecciona una animación para verla</p>
    
    <div class="container" id="lista-animaciones">
        <p>Cargando animaciones...</p>
    </div>
    
    <footer>
        Animaciones creadas para aprendizaje de química | Actualizado automáticamente
    </footer>

    <script>
        // 📌 LISTA DE ANIMACIONES
        // Cuando subas una nueva animación, SOLO agrega una línea aquí
        const animaciones = [
            { nombre: "Iones: H⁺ y Cl⁻", archivo: "iones.html", descripcion: "Formación de iones en cloruro de hidrógeno (HCl). Átomos neutros, enlace covalente y separación en agua.", icono: "⚛️" },
            { nombre: "Modelo Atómico", archivo: "modelo_atomico.html", descripcion: "Estructura del átomo: núcleo y electrones en órbitas. Visualización interactiva.", icono: "🔬" },
            { nombre: "Hidrógeno y Helio", archivo: "hidrogeno_helio.html", descripcion: "Comparación de los átomos de hidrógeno y helio.", icono: "🌿" }
        ];

        // Generar las tarjetas automáticamente
        const contenedor = document.getElementById("lista-animaciones");
        contenedor.innerHTML = "";
        
        for (let i = 0; i < animaciones.length; i++) {
            const anim = animaciones[i];
            contenedor.innerHTML += `
                <div class="card">
                    <div class="icon">${anim.icono}</div>
                    <h3><a href="${anim.archivo}">${anim.nombre}</a></h3>
                    <p>${anim.descripcion}</p>
                </div>
            `;
        }
        
        // Si no hay animaciones, mostrar mensaje
        if (animaciones.length === 0) {
            contenedor.innerHTML = "<p>Próximamente más animaciones...</p>";
        }
    </script>
</body>
</html>
